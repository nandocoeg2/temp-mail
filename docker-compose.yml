services:
  app:
    image: ${DROPMAIL_IMAGE:-ghcr.io/OWNER/REPO/dropmail:local}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_DOMAIN: ${APP_DOMAIN}
      INBOUND_WEBHOOK_SECRET: ${INBOUND_WEBHOOK_SECRET}
      METRICS_TOKEN: ${METRICS_TOKEN}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: "true"
      ATTACHMENT_BUCKET: ${MINIO_BUCKET}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      CLAMAV_TIMEOUT_MS: ${CLAMAV_TIMEOUT_MS:-3000}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_started
    networks:
      - dropmail

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dropmail

  minio:
    image: minio/minio:RELEASE.2026-04-12T18-45-03Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dropmail

  minio-init:
    image: minio/mc:RELEASE.2026-04-12T17-29-24Z
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_RETENTION_DAYS: ${MINIO_RETENTION_DAYS:-1}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set dropmail http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "dropmail/$${MINIO_BUCKET}"
        mc anonymous set none "dropmail/$${MINIO_BUCKET}"
        mc ilm rule add "dropmail/$${MINIO_BUCKET}" --expire-days "$${MINIO_RETENTION_DAYS:-1}" || true
    networks:
      - dropmail

  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    volumes:
      - clamav-db:/var/lib/clamav
    networks:
      - dropmail

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx-cache:/var/cache/nginx
    networks:
      - dropmail

volumes:
  postgres-data:
  minio-data:
  clamav-db:
  nginx-cache:

networks:
  dropmail:
    driver: bridge
