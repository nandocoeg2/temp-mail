name: Deploy to Production

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Raspberry Pi
    needs: build
    runs-on: [self-hosted, raspberry-pi]
    
    steps:
      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
      
      - name: Pull latest image
        run: |
          # Use main tag (stable)
          docker pull ghcr.io/nandocoeg2/temp-mail:main
      
      - name: Stop and remove old container
        run: |
          cd /opt/temp-mail
          docker compose down app || true
      
      - name: Update docker-compose.yml with new image
        run: |
          cd /opt/temp-mail
          # Backup current compose file
          cp docker-compose.yml docker-compose.yml.backup
          
          # Update image tag in compose file
          sed -i "s|image:.*temp-mail.*|image: ghcr.io/nandocoeg2/temp-mail:main|g" docker-compose.yml || \
          sed -i "s|build:.*|image: ghcr.io/nandocoeg2/temp-mail:main|g" docker-compose.yml
      
      - name: Start new container
        run: |
          cd /opt/temp-mail
          docker compose up -d app
      
      - name: Wait for health check
        run: |
          echo "Waiting for app to be healthy..."
          timeout 60 bash -c 'until curl -f http://localhost:3001/api/health 2>/dev/null; do sleep 2; done' || \
          timeout 60 bash -c 'until docker ps | grep temp-mail-app | grep -q "Up"; do sleep 2; done'
          echo "✅ App is running"
      
      - name: Show container status
        run: |
          docker ps | grep temp-mail
          echo ""
          echo "🚀 Deployment successful!"
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "Digest: ${{ needs.build.outputs.image-digest }}"
      
      - name: Cleanup old images
        run: |
          # Keep last 3 images, remove older ones
          docker images ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} --format "{{.ID}} {{.CreatedAt}}" | \
          sort -rk 2 | tail -n +4 | awk '{print $1}' | xargs -r docker rmi || true
          
          # Prune dangling images
          docker image prune -f

  notify:
    name: Notify Deployment Status
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Deployment Success
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment berhasil!"
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "URL: https://mail.xpriv.cloud"
      
      - name: Deployment Failed
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment gagal!"
          exit 1
